name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            resume-api/package-lock.json
            resume-web/package-lock.json

      - name: Install dependencies (API)
        working-directory: ./resume-api
        run: npm ci

      - name: Build API
        working-directory: ./resume-api
        run: npm run build

      - name: Install dependencies (Web)
        working-directory: ./resume-web
        run: npm ci

      - name: Build Web
        working-directory: ./resume-web
        run: npm run build
        
      # If tests existed we could add: `npm test` here.

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Test Docker Compose Build
        run: docker-compose build
